version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: test_results_db
    restart: always
    environment:
      POSTGRES_USER: grafana_user
      POSTGRES_PASSWORD: grafana_pass
      POSTGRES_DB: test_results
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
